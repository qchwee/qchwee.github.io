<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invitation</title>
  <link rel="stylesheet" href="style.css" />
 
  <!-- Import map so the browser knows where to fetch the "three" module from -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
    }
  }
  </script>
</head>
<body>
 
  <canvas id="scene"></canvas>
 
  <div id="hint">
    <span class="hint-line"><strong>Right-click + drag</strong> — spin the envelope</span>
    <span class="hint-line"><strong>Space</strong> — open envelope / flip card</span>
  </div>
 
  <script type="module" src="main.js"></script>
</body>
</html>
